services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sift-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://sift:sift@postgres:5432/sift
      MODEL_PROVIDER: ${MODEL_PROVIDER:-openai-compatible}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-http://host.docker.internal:9000/v1}
      MODEL_API_KEY: ${MODEL_API_KEY:-local}
      MODEL_TEXT_BASE_URL: ${MODEL_TEXT_BASE_URL:-}
      MODEL_TEXT_API_KEY: ${MODEL_TEXT_API_KEY:-}
      MODEL_TEXT_MODEL: ${MODEL_TEXT_MODEL:-Qwen3.5-27B-Claude-4.6-Opus-Distilled-MLX-4bit}
      MODEL_TEXT_THINKING: ${MODEL_TEXT_THINKING:-}
      MODEL_TEXT_REASONING_EFFORT: ${MODEL_TEXT_REASONING_EFFORT:-}
      MODEL_EMBEDDING_BASE_URL: ${MODEL_EMBEDDING_BASE_URL:-}
      MODEL_EMBEDDING_API_KEY: ${MODEL_EMBEDDING_API_KEY:-}
      MODEL_EMBEDDING_MODEL: ${MODEL_EMBEDDING_MODEL:-bge-m3-mlx-fp16}
      MODEL_EMBEDDING_DIMENSIONS: ${MODEL_EMBEDDING_DIMENSIONS:-1024}
      MODEL_VISION_BASE_URL: ${MODEL_VISION_BASE_URL:-}
      MODEL_VISION_API_KEY: ${MODEL_VISION_API_KEY:-}
      MODEL_VISION_MODEL: ${MODEL_VISION_MODEL:-}
      JOB_DISPATCHER: ${JOB_DISPATCHER:-inline}
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-local}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-local}
      SIFT_SINGLE_USER_ID: ${SIFT_SINGLE_USER_ID:-00000000-0000-0000-0000-000000000001}
      SIFT_TRUST_USER_HEADER: ${SIFT_TRUST_USER_HEADER:-false}
      SIFT_USER_ID_HEADER: ${SIFT_USER_ID_HEADER:-x-sift-user-id}
      SIFT_AGENT_API_KEY: ${SIFT_AGENT_API_KEY:-}
    ports:
      - "3000:3000"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: sift-postgres
    environment:
      POSTGRES_DB: sift
      POSTGRES_USER: sift
      POSTGRES_PASSWORD: sift
    ports:
      - "5432:5432"
    volumes:
      - sift_postgres_data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sift -d sift"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sift_postgres_data:
