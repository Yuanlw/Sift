      .tiny { font: 600 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; fill: #3A4657; }
      .blue { stroke: #2E6DF6; }
      .green { stroke: #25853A; }
      .orange { stroke: #FF8A1D; }
      .blueText { fill: #1557D6; }
      .greenText { fill: #177331; }
      .orangeText { fill: #F26B00; }
      .muted { fill: #5E6A7C; }
