<svg width="1200" height="1440" viewBox="0 0 1200 1440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#17324D" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="1440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFDFF"/>
      <stop offset="0.55" stop-color="#F8FBF8"/>
      <stop offset="1" stop-color="#FFF9F2"/>
    </linearGradient>
